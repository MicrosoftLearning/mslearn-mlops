name: Train model in prod (PR comment)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  train-prod:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/train-prod')
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        run: |
          az extension add -n ml -y

      - name: Detect Azure ML workspace
        id: detect
        run: |
          RG_NAME=$(az group list --query "[?starts_with(name,'rg-ai300-l')].name | [0]" -o tsv)
          if [ -z "$RG_NAME" ]; then
            echo "No resource group starting with rg-ai300-l found." >&2
            exit 1
          fi

          WS_NAME=$(az ml workspace list --resource-group "$RG_NAME" --query "[?starts_with(name,'mlw-ai300-l')].name | [0]" -o tsv)
          if [ -z "$WS_NAME" ]; then
            echo "No workspace starting with mlw-ai300-l found in $RG_NAME." >&2
            exit 1
          fi

          az configure --defaults group="$RG_NAME" workspace="$WS_NAME"

          echo "resource_group=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "workspace=$WS_NAME" >> "$GITHUB_OUTPUT"

      - name: Run training job in prod
        id: train
        run: |
          JOB_NAME="diabetes-train-prod-${{ github.run_id }}"
          echo "Running Azure ML job in prod: $JOB_NAME"
          az ml job create \
            -f src/job.yml \
            --name "$JOB_NAME" \
            --set inputs.training_data.path=azureml:diabetes-prod-folder@latest \
            --query name -o tsv

          echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"

      - name: Stream prod training job
        run: |
          az ml job stream --name "${{ steps.train.outputs.job_name }}"

      - name: Download prod training outputs
        id: download
        run: |
          JOB_NAME="${{ steps.train.outputs.job_name }}"
          mkdir -p downloaded-job
          az ml job download --name "$JOB_NAME" --output-name metrics_output --download-path downloaded-job

          METRICS_FILE=$(find downloaded-job -name metrics.json | head -n 1)
          if [ -z "$METRICS_FILE" ]; then
            echo "Downloaded files:" >&2
            find downloaded-job -maxdepth 5 -type f | sort >&2 || true
            echo "No metrics.json found in downloaded job outputs." >&2
            exit 1
          fi

          STUDIO_URL=$(az ml job show --name "$JOB_NAME" --query services.Studio.endpoint -o tsv)

          echo "metrics_file=$METRICS_FILE" >> "$GITHUB_OUTPUT"
          echo "studio_url=$STUDIO_URL" >> "$GITHUB_OUTPUT"

      - name: Extract prod metrics from output artifact
        id: parse-metrics
        run: |
          if [ ! -f "${{ steps.download.outputs.metrics_file }}" ]; then
            echo "No metrics file found to parse." >&2
            exit 1
          fi

          ACC=$(python -c "import json; print(json.load(open(r'${{ steps.download.outputs.metrics_file }}', encoding='utf-8'))['accuracy'])")
          AUC=$(python -c "import json; print(json.load(open(r'${{ steps.download.outputs.metrics_file }}', encoding='utf-8'))['auc'])")

          echo "Prod accuracy: $ACC"
          echo "Prod AUC: $AUC"

          echo "prod_accuracy=$ACC" >> "$GITHUB_OUTPUT"
          echo "prod_auc=$AUC" >> "$GITHUB_OUTPUT"

      - name: Comment prod metrics on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const acc = '${{ steps.parse-metrics.outputs.prod_accuracy }}';
            const auc = '${{ steps.parse-metrics.outputs.prod_auc }}';
            const jobName = '${{ steps.train.outputs.job_name }}';
            const studioUrl = '${{ steps.download.outputs.studio_url }}';

            const prNumber = context.issue.number;

            let body = '✅ Prod training workflow completed.';
            body += '\n\n**Azure ML job**';
            body += `\n- Name: ${jobName}`;
            if (studioUrl) body += `\n- Studio: ${studioUrl}`;

            body += '\n\n**Prod evaluation metrics**';
            body += `\n- Accuracy: ${acc}`;
            body += `\n- AUC: ${auc}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
